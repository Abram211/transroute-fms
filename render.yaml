services:
  - type: web
    name: transroute-fms
    env: php
    buildCommand:  bash build.sh
      composer install --no-dev --optimize-autoloader
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    startCommand: php artisan serve --host=0.0.0.0 --port=$PORT
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://transroute-fms.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: transroute-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: transroute-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: transroute-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: transroute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: transroute-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

databases:
  - name: transroute-db
    databaseName: transroute_fms
    plan: free
    ipAllowList: []