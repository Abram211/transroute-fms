services:
  - type: web
    name: transroute-fms
    runtime: docker
    dockerContext: ./fms
    dockerfilePath: ./fms/Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://transroute-fms.onrender.com
      - key: DB_CONNECTION
        value: mysql
      - key: DB_HOST
        fromDatabase:
          name: transroute-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: transroute-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: transroute-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: transroute-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: transroute-db
          property: password
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

databases:
  - name: transroute-db
    databaseName: transroute_fms
    plan: free