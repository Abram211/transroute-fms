version: '3.9'

services:
  app:
    build:
      context: ./fms
      dockerfile: Dockerfile
    image: transroute-fms-app
    ports:
      - "8000:8000"
    volumes:
      - ./fms:/var/www/html
      - ./fms/storage:/var/www/html/storage
    environment:
      APP_ENV: local
      APP_DEBUG: 'true'
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: transroute_fms
      DB_USERNAME: root
      DB_PASSWORD: witty
    depends_on:
      - mysql
    command: sh -c "until mysqladmin ping -h mysql --silent; do sleep 1; done; php artisan migrate --force; php artisan serve --host=0.0.0.0 --port=8000"
    networks:
      - appnet

  mysql:
    image: mysql:8.1
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: witty
      MYSQL_DATABASE: transroute_fms
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - appnet

volumes:
  db_data:

networks:
  appnet:
    driver: bridge
